name: Selenium Grid Tests

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ✅ Install Node (for Allure CLI)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install Allure CLI
        run: npm install -g allure-commandline --save-dev

      # ✅ Prepare folders
      - name: Prepare Report Folders
        run: |
          mkdir -p Reports/Videos \
                   Reports/Logs \
                   Reports/HtmlReport \
                   Reports/AllureReport \
                   Reports/Screenshots

      # ✅ Start Selenium Grid
      - name: Start Selenium Grid
        run: docker compose up -d

      - name: Wait for Grid
        run: sleep 20

      # ✅ Run Tests
      - name: Run pytest
        run: |
          pytest -v \
          --html=Reports/HtmlReport/report.html \
          --self-contained-html \
          --alluredir=Reports/AllureReport

      # ✅ Generate Allure Report (NO DOCKER, NO JAVA IMAGE ISSUE)
      - name: Generate Allure Report
        run: |
          allure generate Reports/AllureReport -o Reports/AllureReport/html

      # ✅ Upload Reports
      - name: Upload HTML Report
        uses: actions/upload-artifact@v4
        with:
          name: html-report
          path: Reports/HtmlReport/report.html
          if-no-files-found: ignore

      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: Reports/AllureReport/html
          if-no-files-found: ignore

      - name: Upload Screenshots
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: Reports/Screenshots
          if-no-files-found: ignore

      - name: Upload Videos
        uses: actions/upload-artifact@v4
        with:
          name: videos
          path: Reports/Videos
          if-no-files-found: ignore

      - name: Upload Logs
        uses: actions/upload-artifact@v4
        with:
          name: logs
          path: Reports/Logs
          if-no-files-found: ignore

      # ✅ Cleanup
      - name: Stop Selenium Grid
        if: always()
        run: docker compose down